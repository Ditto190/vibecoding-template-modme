name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [typescript, python, go, node]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        if: matrix.language == 'typescript' || matrix.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run checks (placeholder)
        run: echo "No language-specific checks defined yet for ${{ matrix.language }}."
